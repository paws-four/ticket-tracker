name: check-tickets

# Runs the tracker on a schedule in the cloud — no server to keep on.
# NOTE: GitHub's cron is best-effort and can be delayed several minutes,
# especially at the top of the hour. Good enough for most drops, but not
# millisecond-precise.
on:
  schedule:
    - cron: "*/15 * * * *"   # every 15 minutes
  workflow_dispatch: {}       # adds a "Run workflow" button for manual/test runs

# Needed so the job can commit the updated state.json back to the repo.
permissions:
  contents: write

# Never run two checks at once; queue them instead.
concurrency:
  group: check-tickets
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements-actions.txt

      - name: Install dependencies
        run: pip install -r requirements-actions.txt

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-chromium

      - name: Install Playwright Chromium
        run: python -m playwright install --with-deps chromium

      - name: Run checks
        env:
          NTFY_SERVER: ${{ secrets.NTFY_SERVER }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          NTFY_TOKEN: ${{ secrets.NTFY_TOKEN }}
        run: python run_checks.py

      - name: Commit updated state (only if changed)
        run: |
          if ! git diff --quiet -- state.json; then
            git config user.name  "ticket-tracker-bot"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add state.json
            git commit -m "chore: update tracker state [skip ci]"
            git push
          else
            echo "No state change — nothing to commit."
          fi
